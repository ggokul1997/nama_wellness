version: "3.9"

services:
  postgres_e2e:
    image: postgres:15-alpine
    container_name: nama_postgres_e2e
    restart: unless-stopped
    environment:
      POSTGRES_DB: nama_wellness_test
      POSTGRES_USER: nama_user
      POSTGRES_PASSWORD: nama_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nama_user -d nama_wellness_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_e2e:
    image: redis:7-alpine
    container_name: nama_redis_e2e
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
