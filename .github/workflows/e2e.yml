name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: nama_wellness_test
          POSTGRES_USER: nama_user
          POSTGRES_PASSWORD: nama_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Install dependencies
      run: pnpm install

    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps chromium
      working-directory: apps/e2e

    - name: Create .env.test
      run: |
        echo "DATABASE_URL=postgresql://nama_user:nama_password@localhost:5433/nama_wellness_test?schema=public" > .env.test
        echo "DIRECT_URL=postgresql://nama_user:nama_password@localhost:5433/nama_wellness_test?schema=public" >> .env.test
        echo "REDIS_URL=redis://localhost:6380" >> .env.test
        echo "NODE_ENV=test" >> .env.test
        echo "JWT_ACCESS_SECRET=super_secret_for_tests_must_be_32_chars_long_at_least" >> .env.test
        echo "JWT_REFRESH_SECRET=super_secret_for_tests_must_be_32_chars_long_at_least_2" >> .env.test

    - name: Generate Prisma Client
      run: pnpm run db:generate

    - name: Run Playwright tests
      run: pnpm run test:e2e

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: apps/e2e/playwright-report/
        retention-days: 30
